services:
  notification-service:
    build:
      context: ..
      dockerfile: chatapp-notification/services/notification-service/Dockerfile
    container_name: chatapp-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-4010}:4010"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT:-4010}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL:-http://chat-service:4000}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
    networks:
      - chatapp-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:${NOTIFICATION_SERVICE_PORT:-4010}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  chatapp-network:
    external: true
    name: chatapp-network
